<!doctype html>
<html lang="zh-Hant">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LingBot-Map{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <a class="brand" href="/">LingBot-Map</a>

</html>
